<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="rddGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e04e17;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="dfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Header Badge -->
  <rect x="450" y="25" width="300" height="30" rx="15" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="600" y="45" font-family="monospace" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="3">APACHE SPARK</text>

  <!-- Title -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle">
    <tspan fill="#ff6b35">RDD</tspan>
    <tspan fill="#64748b" dx="15">→</tspan>
    <tspan fill="#00d4ff" dx="15">DataFrame</tspan>
  </text>
  <text x="600" y="135" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
    The Definitive Conversion Guide
  </text>

  <!-- Main comparison boxes -->
  <!-- RDD Box -->
  <g transform="translate(150, 180)">
    <rect x="0" y="0" width="380" height="320" rx="15" fill="#111827" stroke="#ff6b35" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="50" rx="15" fill="url(#rddGrad)"/>
    <rect x="0" y="25" width="380" height="25" fill="url(#rddGrad)"/>
    <text x="190" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">⚡ RDD</text>

    <g transform="translate(25, 70)" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text y="0"><tspan fill="#ef4444">✗</tspan> No Catalyst optimizer</text>
      <text y="30"><tspan fill="#ef4444">✗</tspan> No schema enforcement</text>
      <text y="60"><tspan fill="#ef4444">✗</tspan> Java object serialization</text>
      <text y="90"><tspan fill="#ef4444">✗</tspan> High GC pressure</text>
      <text y="120"><tspan fill="#ef4444">✗</tspan> No predicate pushdown</text>
      <text y="165"><tspan fill="#10b981">✓</tspan> Full Python/Scala control</text>
      <text y="195"><tspan fill="#10b981">✓</tspan> Unstructured data</text>
      <text y="225"><tspan fill="#10b981">✓</tspan> Custom partitioning</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(555, 340)">
    <rect x="0" y="-25" width="90" height="50" rx="25" fill="url(#arrowGrad)" filter="url(#glow)"/>
    <text x="45" y="8" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">→</text>
  </g>

  <!-- DataFrame Box -->
  <g transform="translate(670, 180)">
    <rect x="0" y="0" width="380" height="320" rx="15" fill="#111827" stroke="#00d4ff" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="50" rx="15" fill="url(#dfGrad)"/>
    <rect x="0" y="25" width="380" height="25" fill="url(#dfGrad)"/>
    <text x="190" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">🚀 DataFrame</text>

    <g transform="translate(25, 70)" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text y="0"><tspan fill="#10b981">✓</tspan> Catalyst query optimization</text>
      <text y="30"><tspan fill="#10b981">✓</tspan> Schema validation at parse-time</text>
      <text y="60"><tspan fill="#10b981">✓</tspan> Tungsten off-heap memory</text>
      <text y="90"><tspan fill="#10b981">✓</tspan> Minimal GC overhead</text>
      <text y="120"><tspan fill="#10b981">✓</tspan> Predicate pushdown &amp; pruning</text>
      <text y="150"><tspan fill="#10b981">✓</tspan> SQL compatibility</text>
      <text y="180"><tspan fill="#10b981">✓</tspan> Delta Lake ready</text>
      <text y="210"><tspan fill="#10b981">✓</tspan> Unity Catalog integration</text>
      <text y="240"><tspan fill="#10b981">✓</tspan> Photon engine compatible</text>
    </g>
  </g>

  <!-- 6 Methods Section -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    6 Conversion Methods
  </text>

  <!-- Method boxes -->
  <g transform="translate(50, 565)">
    <!-- Method 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="85" y="25" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle">toDF()</text>
      <text x="85" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Quick &amp; dirty</text>
      <text x="85" y="60" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⭐⭐⭐</text>
    </g>

    <!-- Method 2 -->
    <g transform="translate(185, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="85" y="25" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle">createDataFrame()</text>
      <text x="85" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">General purpose</text>
      <text x="85" y="60" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⭐⭐⭐⭐</text>
    </g>

    <!-- Method 3 - Highlighted -->
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#0f3d3e" stroke="#10b981" stroke-width="2"/>
      <text x="85" y="25" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">createDataFrame</text>
      <text x="85" y="38" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">(rdd, schema)</text>
      <text x="85" y="55" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">⭐ PRODUCTION</text>
    </g>

    <!-- Method 4 -->
    <g transform="translate(555, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="85" y="25" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle">Row objects</text>
      <text x="85" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Nested structures</text>
      <text x="85" y="60" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⭐⭐⭐⭐</text>
    </g>

    <!-- Method 5 -->
    <g transform="translate(740, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="85" y="25" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle">spark.read.json()</text>
      <text x="85" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">JSON strings</text>
      <text x="85" y="60" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⭐⭐⭐</text>
    </g>

    <!-- Method 6 -->
    <g transform="translate(925, 0)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="85" y="25" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle">mapInPandas</text>
      <text x="85" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Vectorized UDF</text>
      <text x="85" y="60" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⭐⭐⭐⭐⭐</text>
    </g>
  </g>

  <!-- Warning callout -->
  <g transform="translate(100, 670)">
    <rect x="0" y="0" width="450" height="70" rx="10" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="25" y="25" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" font-weight="bold">⚠️ Schema Inference Warning</text>
    <text x="25" y="45" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">toDF() without schema triggers FULL RDD scan.</text>
    <text x="25" y="60" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">On 1TB data = 10+ minutes startup delay!</text>
  </g>

  <!-- Golden Rule -->
  <g transform="translate(600, 670)">
    <rect x="0" y="0" width="500" height="70" rx="10" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="25" y="25" font-family="Arial, sans-serif" font-size="14" fill="#10b981" font-weight="bold">💡 The Golden Rule</text>
    <text x="25" y="45" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">95% DataFrame → 5% RDD (when needed) → DataFrame ASAP</text>
    <text x="25" y="60" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Always define schemas explicitly in production.</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(150, 760)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#00d4ff">6</text>
    <text x="25" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Methods</text>

    <text x="120" y="0" font-family="monospace" font-size="14" fill="#00d4ff">14</text>
    <text x="145" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Sections</text>

    <text x="240" y="0" font-family="monospace" font-size="14" fill="#00d4ff">30+</text>
    <text x="280" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Examples</text>

    <text x="800" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">github.com/JohnShuShu/rdd-to-dataframe-guide</text>
  </g>
</svg>
